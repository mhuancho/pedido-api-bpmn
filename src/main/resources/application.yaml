server:
  port: 4222

spring:
  application:
    name: camunda-api-demo

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5534/ventas_db}
    username: ${DB_USERNAME:postgres17}
    password: ${DB_PASSWORD:123}
  jpa:
    hibernate:
      ddl-auto: none
    generate-ddl: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:18080/auth/realms/camunda-platform}
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 0.1
  observations:
    annotations:
      enabled: true
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
  structured:
    format:
      console: ecs

app:
  security:
    jwt:
      resource-client-id: ${JWT_RESOURCE_CLIENT_ID:orchestration-api}
  outbox:
    publisher-delay-ms: 3000
    max-retries: 10
    cleanup-retention-hours: 168
  idempotency:
    retention-hours: 168
  orchestration:
    base-url: ${ORCHESTRATION_BASE_URL:http://localhost:4333}
    connect-timeout-ms: ${ORCHESTRATION_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${ORCHESTRATION_READ_TIMEOUT_MS:5000}
    retry-max-attempts: ${ORCHESTRATION_RETRY_MAX_ATTEMPTS:2}
    retry-period-ms: ${ORCHESTRATION_RETRY_PERIOD_MS:200}
    retry-max-period-ms: ${ORCHESTRATION_RETRY_MAX_PERIOD_MS:1000}
    security:
      token-header: ${INTERNAL_TOKEN_HEADER:X-Internal-Token}
      token: ${INTERNAL_API_TOKEN:change-me-internal-token}
    keys:
      process-pedido: PEDIDO_PROCESS
      message-pedido-aprobado: PEDIDO_APROBADO
      message-pedido-pagado: PEDIDO_PAGADO
      message-pedido-cancelado: PEDIDO_CANCELADO
  workflow:
    process:
      pedido: proceso-pedido
    messages:
      aprobado-pedido: pedido-aprobado
      pagado-pedido: pedido-pagado
      cancelado-pedido: pedido-cancelado
